<!DOCTYPE html>
<html>
<head>
    <title>Ads Money Bot</title>
    <style>
        body { background: #1a1a1a; color: white; text-align: center; font-family: sans-serif; }
        .balance-card { background: #333; margin: 20px; padding: 20px; border-radius: 15px; }
        .btn { background: #0088cc; color: white; padding: 15px 30px; border: none; border-radius: 10px; font-size: 18px; cursor: pointer; }
        #coins { font-size: 24px; color: #f1c40f; }
    </style>
</head>
<body>
    <div class="balance-card">
        <p>Sizning balansingiz:</p>
        <div id="coins">0.00 $</div>
    </div>
    
    <button class="btn" onclick="showAd()">Reklama ko'rish (+0.01$)</button>

    <script>
        let balance = 0;
        function showAd() {
            // Bu yerga reklama kodi qo'yiladi
            alert("Reklama yuklanmoqda...");
            setTimeout(() => {
                balance += 0.01;
                document.getElementById('coins').innerText = balance.toFixed(2) + " $";
            }, 2000);
        }
    </script>
</body>
</html>
