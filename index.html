<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reklama Pul Bot</title>
    <script src="https://app.adsgram.ai/js/adsgram-ad-sdk.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: white;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }
        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .page { display: none; width: 100%; text-align: center; }
        .active { display: block; }

        /* Balance Card */
        .balance-card {
            background: linear-gradient(135deg, #f39c12, #d35400);
            padding: 30px;
            border-radius: 25px;
            width: 85%;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            margin-bottom: 30px;
        }
        .balance-amount { font-size: 48px; font-weight: bold; margin: 10px 0; }
        
        /* Buttons */
        .main-btn {
            background-color: #2ecc71;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 50px;
            cursor: pointer;
            width: 80%;
            font-weight: bold;
            transition: 0.3s;
        }
        .main-btn:active { transform: scale(0.95); }

        /* Navbar */
        .navbar {
            display: flex;
            background-color: #1e1e1e;
            padding: 10px 0;
            border-top: 1px solid #333;
        }
        .nav-item {
            flex: 1;
            text-align: center;
            font-size: 12px;
            cursor: pointer;
            opacity: 0.6;
        }
        .nav-item.active-nav { opacity: 1; color: #f39c12; }
        .nav-icon { font-size: 24px; display: block; }

        /* Input for referal */
        .ref-box {
            background: #1e1e1e;
            padding: 15px;
            border-radius: 10px;
            margin: 10px;
            word-break: break-all;
        }
    </style>
</head>
<body>

    <div id="home" class="container page active">
        <div class="balance-card">
            <div>Sizning balansingiz</div>
            <div class="balance-amount" id="balance">0</div>
            <div>Tangalar</div>
        </div>
        <button class="main-btn" onclick="showAd()">Reklama ko'rish +100 🟡</button>
        <p id="status" style="margin-top: 20px; color: #888;">Tayyor</p>
    </div>

    <div id="friends" class="container page">
        <h2>Do'stlarni taklif qiling</h2>
        <p>Har bir do'stingiz uchun 500 tanga oling!</p>
        <div class="ref-box" id="ref-link">Yuklanmoqda...</div>
        <button class="main-btn" style="background-color: #3498db;" onclick="copyRef()">Linkni nusxalash</button>
    </div>

    <div id="wallet" class="container page">
        <h2>Pul yechib olish</h2>
        <p>Minimal miqdor: 10,000 tanga</p>
        <input type="text" placeholder="Karta raqami yoki TON hamyon" style="width: 80%; padding: 10px; border-radius: 10px; border: none; margin-bottom: 10px;">
        <button class="main-btn" style="background-color: #e74c3c;" onclick="withdraw()">Yechib olish</button>
    </div>

    <div class="navbar">
        <div class="nav-item active-nav" onclick="showPage('home', this)">
            <span class="nav-icon">🏠</span>Asosiy
        </div>
        <div class="nav-item" onclick="showPage('friends', this)">
            <span class="nav-icon">👥</span>Do'stlar
        </div>
        <div class="nav-item" onclick="showPage('wallet', this)">
            <span class="nav-icon">💰</span>Kassa
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let balance = parseInt(localStorage.getItem('balance')) || 0;
        document.getElementById('balance').innerText = balance;

        // AdsGram ID ni bu yerda tekshiring (qo'shtirnoqsiz raqam)
        const AdController = window.AdsGram.init({ blockId: 3542 });

        function showAd() {
            document.getElementById('status').innerText = "Reklama yuklanmoqda...";
            
            AdController.show().then((result) => {
                balance += 100;
                localStorage.setItem('balance', balance);
                document.getElementById('balance').innerText = balance;
                document.getElementById('status').innerText = "Muvaffaqiyatli! +100 tanga";
            }).catch((result) => {
                document.getElementById('status').innerText = "Hozircha reklama yo'q. Keyinroq urinib ko'ring.";
            });
        }

        function showPage(pageId, navEl) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active-nav'));
            
            document.getElementById(pageId).classList.add('active');
            navEl.classList.add('active-nav');
        }

        // Referal link (Hozircha oddiy, keyinchalik backend bilan ulanadi)
        const user_id = tg.initDataUnsafe.user ? tg.initDataUnsafe.user.id : "user";
        document.getElementById('ref-link').innerText = "https://t.me/Quiz_Robot_Uz_bot?start=" + user_id;

        function copyRef() {
            const link = document.getElementById('ref-link').innerText;
            navigator.clipboard.writeText(link);
            alert("Referal link nusxalandi!");
        }

        function withdraw() {
            if (balance < 10000) {
                alert("Mablag' yetarli emas! Kamida 10,000 tanga yig'ing.");
            } else {
                alert("Arizangiz qabul qilindi. 24 soat ichida ko'rib chiqiladi.");
            }
        }
    </script>
</body>
</html>
