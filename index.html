<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Money Bot</title>
    <script src="https://sad.adsgram.ai/js/adsgram-ad-sdk.js"></script>
    <style>
        body {
            background-color: #1a1a1a;
            color: white;
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .balance-card {
            background: linear-gradient(135deg, #f39c12, #d35400);
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            width: 80%;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            margin-bottom: 30px;
        }
        .balance-amount {
            font-size: 40px;
            font-weight: bold;
        }
        .ad-button {
            background-color: #2ecc71;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(46, 204, 113, 0.4);
            transition: 0.3s;
        }
        .ad-button:active {
            transform: scale(0.95);
        }
        .status {
            margin-top: 20px;
            font-size: 14px;
            color: #bdc3c7;
        }
    </style>
</head>
<body>

    <div class="balance-card">
        <p>Sizning balansingiz</p>
        <div class="balance-amount" id="balance">0</div>
        <p>Tangalar</p>
    </div>

    <button class="ad-button" onclick="showAd()">Reklama ko'rish +100 🪙</button>
    
    <p class="status" id="status">Reklama ko'ring va pul ishlang!</p>

    <script>
        let coins = localStorage.getItem('coins') || 0;
        document.getElementById('balance').innerText = coins;

        // AdsGram-ni sozlash (ID-ni keyinchalik o'zgartirasiz)
        const AdController = window.AdsGram.init({ blockId: 354 });

        function showAd() {
            document.getElementById('status').innerText = "Reklama yuklanmoqda...";
            
            AdController.show().then((result) => {
                // Foydalanuvchi reklamani oxirigacha ko'rsa
                coins = parseInt(coins) + 100;
                localStorage.setItem('coins', coins);
                document.getElementById('balance').innerText = coins;
                document.getElementById('status').innerText = "Tabriklaymiz! +100 tanga qo'shildi.";
            }).catch((result) => {
                // Xatolik bo'lsa yoki reklama ko'rilmasa
                document.getElementById('status').innerText = "Reklama topilmadi yoki uzilib qoldi.";
                console.error(result);
            });
        }
    </script>
</body>
</html>
